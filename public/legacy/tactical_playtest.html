<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tactical Dungeon Playtest</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #191d20;
      --panel-2: #20262b;
      --line: #30383f;
      --text: #f1f4ef;
      --muted: #a0a9a2;
      --good: #98d66e;
      --warn: #e9c46a;
      --bad: #e76f51;
      --blue: #73b7e6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-weight: 700;
    }

    button {
      cursor: pointer;
    }

    button:hover { border-color: #53616b; }
    button:disabled { cursor: not-allowed; opacity: 0.45; }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #121518;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .build-tag {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #111416;
    }

    .rooms {
      display: grid;
      grid-template-columns: repeat(20, minmax(34px, 1fr));
      gap: 4px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: #15191c;
    }

    .room {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      background: #111416;
    }

    .room.current { border-color: var(--warn); color: var(--warn); background: #242013; }
    .room.cleared { border-color: #385f38; color: var(--good); }
    .room.boss { box-shadow: inset 0 -3px 0 rgba(231, 111, 81, 0.45); }

    main {
      display: grid;
      grid-template-columns: minmax(220px, 300px) minmax(360px, 1fr) minmax(260px, 340px);
      gap: 12px;
      padding: 12px 16px 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      min-width: 0;
    }

    .panel h2 {
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 12px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px;
      background: #121619;
    }

    .label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .value {
      margin-top: 3px;
      font-size: 18px;
      font-weight: 800;
    }

    .bar {
      width: 100%;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #0b0d0f;
      border: 1px solid var(--line);
      margin-top: 8px;
    }

    .bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #6fbf73, #d0c75f);
      width: 100%;
    }

    .bar.mana > span {
      background: linear-gradient(90deg, #4fb7ff, #b899ff);
    }

    .enemy-list {
      display: grid;
      gap: 10px;
    }

    .enemy {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #13171a;
      cursor: pointer;
    }

    .enemy.selected {
      border-color: var(--warn);
      background: #211d14;
    }

    .enemy.riposted {
      border-color: var(--warn);
      box-shadow: inset 0 0 0 1px rgba(233, 196, 106, 0.35);
    }

    .enemy.dead {
      opacity: 0.45;
      cursor: default;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 7px;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-weight: 900;
      background: linear-gradient(135deg, #3e4850, #171b1e);
      overflow: hidden;
    }

    .enemy-sprite {
      display: block;
      image-rendering: pixelated;
    }

    .enemy-name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
    }

    .intent {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      margin-top: 5px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #0e1113;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
    }

    .intent.heavy, .intent.pierce { color: var(--bad); }
    .intent.strike { color: var(--warn); }
    .intent.guard { color: var(--blue); }
    .intent.aim { color: #bf9fff; }
    .intent.heal, .intent.shield { color: var(--good); }
    .intent.invisibility { color: #ffd369; }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .actions button {
      display: grid;
      align-content: start;
      gap: 3px;
      min-height: 78px;
      padding: 8px;
      text-align: left;
      line-height: 1.15;
    }

    .actions button.pressure-ready {
      border-color: rgba(115, 183, 230, 0.72);
      box-shadow: inset 0 0 0 1px rgba(115, 183, 230, 0.18);
    }

    .actions button.riposte-ready {
      border-color: rgba(233, 196, 106, 0.82);
      box-shadow: inset 0 0 0 1px rgba(233, 196, 106, 0.24);
    }

    .action-title {
      font-size: 13px;
      font-weight: 900;
    }

    .action-meta,
    .action-extra {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .action-extra.good { color: var(--good); }
    .action-extra.warn { color: var(--warn); }
    .action-extra.bad { color: var(--bad); }
    .action-extra.pressure { color: var(--blue); }

    .combat-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .loot-grid {
      display: grid;
      gap: 8px;
    }

    .loot-card {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 10px;
      text-align: left;
      min-height: 72px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #13171a;
      cursor: pointer;
    }

    .loot-card.consumable {
      border-color: rgba(118, 197, 255, 0.30);
    }

    .loot-card.skip {
      grid-template-columns: 1fr;
      min-height: 54px;
      background: #101416;
    }

    .loot-card.rare,
    .loot-card.very-rare,
    .loot-card.epic,
    .loot-card.legendary {
      border-color: rgba(255, 201, 107, 0.52);
      background: #171614;
    }

    .loot-card.unique {
      border-color: rgba(255, 118, 96, 0.76);
      box-shadow: inset 0 0 0 1px rgba(255, 201, 107, 0.32);
      background: #1a1413;
    }

    .loot-card:hover { border-color: var(--warn); }

    .sprite {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background-size: 1152px 912px;
      image-rendering: pixelated;
      background-color: #050607;
    }

    .loot-name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
    }

    .loot-desc {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .loot-delta {
      display: block;
      font-size: 12px;
      font-weight: 800;
      margin-top: 4px;
    }

    .loot-delta.good { color: var(--good); }
    .loot-delta.warn { color: var(--warn); }
    .loot-delta.bad { color: var(--bad); }

    .log {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 510px;
      overflow: auto;
      font-size: 12px;
      color: #d6ddd8;
    }

    .log-entry {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 8px;
      background: #111416;
      line-height: 1.35;
    }

    .muted { color: var(--muted); }
    .good { color: var(--good); }
    .bad { color: var(--bad); }

    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .rooms { grid-template-columns: repeat(10, minmax(30px, 1fr)); }
    }

    @media (max-width: 560px) {
      header { align-items: flex-start; flex-direction: column; }
      .actions { grid-template-columns: repeat(2, 1fr); }
      .combat-meta { grid-template-columns: 1fr; }
      .rooms { grid-template-columns: repeat(5, minmax(30px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Tactical Dungeon Playtest</h1>
      <div class="top-actions">
        <span class="build-tag" id="buildTag">character: Balanced Swordsman</span>
        <select id="characterSelect" title="Playable character">
          <option value="balancedSwordsman" selected>Balanced Swordsman</option>
          <option value="axeBruiser" disabled>Axe Bruiser - locked</option>
          <option value="needleDuelist" disabled>Needle Duelist - locked</option>
          <option value="warder" disabled>Warder - locked</option>
        </select>
        <button id="exportBtn">Export Run</button>
        <button id="autoBtn">Auto</button>
        <button id="resetBtn">Reset</button>
      </div>
    </header>

    <nav id="rooms" class="rooms"></nav>

    <main>
      <section class="panel">
        <h2>Player</h2>
        <div class="panel-body">
          <div class="stat">
            <div class="label">HP</div>
            <div class="value"><span id="hpValue">10</span> / <span id="maxHpValue">10</span></div>
            <div class="bar"><span id="hpBar"></span></div>
          </div>
          <div class="stat" style="margin-top: 8px">
            <div class="label">Mana</div>
            <div class="value"><span id="manaValue">4</span> / <span id="maxManaValue">4</span></div>
            <div class="bar mana"><span id="manaBar"></span></div>
          </div>
          <div class="stat-grid" style="margin-top: 8px">
            <div class="stat">
              <div class="label">STR</div>
              <div class="value" id="strValue">5</div>
            </div>
            <div class="stat">
              <div class="label">DEX</div>
              <div class="value" id="dexValue">5</div>
            </div>
            <div class="stat">
              <div class="label">Weapon</div>
              <div class="value" id="weaponValue" style="font-size: 14px">Iron Sword</div>
            </div>
            <div class="stat">
              <div class="label">Gear / Stash</div>
              <div class="value" id="lootCount">0</div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2 id="encounterTitle">Encounter</h2>
        <div class="panel-body">
          <div class="combat-meta">
            <div class="stat">
              <div class="label">Round</div>
              <div class="value" id="roundValue">1</div>
            </div>
            <div class="stat">
              <div class="label">Target</div>
              <div class="value" id="targetValue" style="font-size: 14px">-</div>
            </div>
            <div class="stat">
              <div class="label">Mode</div>
              <div class="value" id="phaseValue" style="font-size: 14px">Combat</div>
            </div>
          </div>
          <div id="enemyList" class="enemy-list"></div>
          <div class="actions">
            <button data-action="attack"></button>
            <button data-action="heavy"></button>
            <button data-action="quick"></button>
            <button data-action="sweep"></button>
            <button data-action="guard"></button>
            <button data-action="ability"></button>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Loot / Log</h2>
        <div class="panel-body">
          <div id="lootGrid" class="loot-grid"></div>
          <div id="log" class="log" style="margin-top: 10px"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="/data/tactical_enemy_visuals.js"></script>
  <script src="/data/oryx_creature_fx_catalog_seed.js"></script>
  <script src="/data/oryx_item_catalog_seed.js"></script>
  <script>
    const COMBAT = {
      minPlayerHitChance: 0.32,
      maxPlayerHitChance: 0.95,

      dexterityHitScale: 0.062,
      dexterityHitExponent: 0.62,
      enemyEvasionHitScale: 0.038,
      enemyEvasionExponent: 0.55,
      baseCritChance: 0.03,
      dexterityCritScale: 0.024,
      dexterityCritExponent: 0.72,
      enemyEvasionCritScale: 0.006,
      maxCritChance: 0.55,
      critMultiplier: 1.80,
      dexterityDamageQualityScale: 0.030,
      dexterityDamageQualityExponent: 0.62,
      enemyEvasionDamageQualityScale: 0.016,
      enemyEvasionDamageQualityExponent: 0.55,
      maxDamageQuality: 0.30,
      basePlayerDamage: 1.0,
      strengthDamageScale: 1.0,

    };

    const TACTICAL = {
      attackDamageMultiplier: 1.00,
      heavyDamageMultiplier: 1.60,
      heavyHitModifier: -0.20,
      heavyEvasionHitPenaltyScale: 0.004,
      heavyEvasionHitPenaltyFloor: 3.50,

      heavyGuardIgnore: 0.45,

      heavyGlancingDamageMultiplier: 0.14,
      quickGlancingDamageMultiplier: 0.30,
      sunderDamageBonusPerStack: 0.075,
      sunderQuickEffectiveness: 0.35,
      sunderHeavyEffectiveness: 1.08,
      sunderMaxStacks: 3,
      quickDamageMultiplier: 0.45,
      quickHitModifier: 0.10,
      quickCritModifier: 0.025,
      quickQualityBonus: 0.07,
      sweepDamageMultiplier: 0.42,
      sweepHitModifier: -0.04,
      sweepQualityBonus: 0.05,
      sweepDexterityDamagePerPoint: 0.014,
      sweepMaxDexterityDamageBonus: 0.18,
      sweepGlancingDamageMultiplier: 0.12,
      sweepAutoDamageRatio: 0.82,
      doubleStrikeBaseChance: 0.01,
      doubleStrikePerDexterity: 0.0040,
      maxDoubleStrikeChance: 0.16,
      doubleStrikeDamageMultiplier: 0.45,
      quickInterruptBaseChance: 0.09,
      quickInterruptPerDexterity: 0.0075,
      maxInterruptChance: 0.32,
      playerGuardReduction: 0.52,
      pierceGuardReduction: 0.26,
      enemyGuardReduction: 0.45,
      strikeDamageMultiplier: 1.04,
      heavyIntentDamageMultiplier: 1.72,
      heavyIntentHitModifier: -0.06,
      pierceDamageMultiplier: 0.80,
      pierceHitModifier: 0.04,
      aimAccuracyBonus: 0.16,
      aimDamageBonus: 0.20,
      groupPrimaryHpFactor: 0.68,
      groupPrimaryDamageFactor: 0.40,
      groupSupportHpFactor: 0.50,
      groupSupportDamageFactor: 0.30,
      mageSupportHpFactor: 0.46,
      mageSupportDamageFactor: 0.24,
      mageSupportAccuracyDelta: 0.04,
      mageSupportEvasionFactor: 1.12,
      supportHealDamageMultiplier: 2.40,
      supportShieldDamageMultiplier: 2.15,
      supportShieldMaxHpFraction: 0.42,
      supportHealThreshold: 0.76,
      supportInvisibilityHitPenalty: 0.18,
      maxMana: 4,
      startingMana: 4,
      manaRegenPerRound: 1,
      attackManaCost: 0,
      heavyManaCost: 2,
      quickManaCost: 1,
      sweepManaCost: 2,
      guardManaCost: 0
    };

    const STATS = {
      baseHp: 10.0,
      baseStrength: 5.0,
      baseDexterity: 5.0,
      hpPerPower: 1.18,
      strengthPerPower: 0.58,
      dexterityPerPower: 0.58
    };

    const LOOT = {
      baseLuckPool: 9.20,
      luckPoolGrowth: 1.50,
      normalLuckShare: 0.10,
      bossLuckShare: 0.21,
      luckVariance: 0.22,
      commonCost: 1.0,
      uncommonCost: 1.20,
      rareCost: 3.00,
      veryRareCost: 5.20,
      epicCost: 7.50,
      legendaryCost: 10.25,
      luckyOptionChance: 0.11,
      luckyPowerMultiplier: 1.45,
      jackpotOptionChance: 0.025,
      jackpotPowerMultiplier: 2.35,
      uniqueOptionChance: 0.004,
      uniquePowerMultiplier: 3.20,
      focusDraftChance: 0.30,
      earlyFocusDraftBonus: 0.18,
      focusedStatChoiceChance: 0.76,
      minimumUpgradeScore: 0.05,
      trainingGainMultiplier: 0.25,
      statItemWeight: 0.62,
      weaponItemWeight: 0.38,
      consumableItemWeight: 0.10,
      potionHpPerPower: 1.00,
      wearableSlotLimit: 4,
      stashSlotLimit: 4,
      weaponEffectUncommonChance: 0.28,
      weaponEffectRareChance: 0.50,
      weaponEffectEpicChance: 0.75,
      axeCrushEffectCost: 1.15,
      axeStunEffectCost: 1.45
    };

    const DUNGEON = {
      levels: 5,
      encountersPerLevel: 7,
      initialStatBudget: 0,
      statBudgetGainPerEncounter: 1.55,
      statBudgetGainPerLevel: 3.25,
      statBudgetGainGrowth: 1.08,
      postEncounterHealFraction: 0,
      postLevelHealFraction: 0,
      currentHpFromMaxHpGainFraction: 1
    };

    const BASE_WEAPON = {
      name: "Iron Sword",
      damageMultiplier: 1,
      attackDamageMultiplier: 1,
      heavyDamageMultiplier: 1,
      quickDamageMultiplier: 1,
      sweepDamageMultiplier: 1,
      hitModifier: 0,
      critModifier: 0,
      critMultiplierModifier: 0,
      dexterityMultiplier: 1,
      sunderOnHit: 0,
      sunderOnHeavyHit: 0,
      sunderBonusPerStack: 0,
      stunOnHeavyHitChance: 0
    };

    const SLOT_LABELS = {
      weapon: "Weapon",
      amulet: "Amulet",
      charm: "Charm",
      relic: "Relic",
      consumable: "Now"
    };

    const WEAPON_PRESETS = {
      sword: "Iron Sword",
      crushingAxe: "Crushing Axe",
      stunningAxe: "Stunning Axe",
      heavyAxe: "Heavy Axe",
      rapier: "Needle Rapier"
    };

    const CHARACTER_ROSTER = {
      balancedSwordsman: {
        name: "Balanced Swordsman",
        weaponPreset: "sword",
        weights: { hp: 1, strength: 1, dexterity: 1 },
        ability: {
          id: "riposte",
          name: "Riposte",
          charges: 1,
          manaCost: 2,
          guardReduction: 0.40,
          pierceGuardReduction: 0.22,
          counterDamageMultiplier: 0.82,
          counterTriggers: 1,
          role: "Brace, reduce incoming damage, then counter the first enemy that hits."
        },
        unlocked: true,
        unlock: "Available from the start.",
        role: "Reference character: even growth, Iron Sword, and a counter stance."
      },
      axeBruiser: {
        name: "Axe Bruiser",
        weaponPreset: "heavyAxe",
        weights: { hp: 0.30, strength: 0.45, dexterity: 0.25 },
        unlocked: false,
        unlock: "Rescue the forge prisoner after the level 2 boss.",
        role: "Strength-leaning fighter with slower, heavier weapon identity."
      },
      needleDuelist: {
        name: "Needle Duelist",
        weaponPreset: "rapier",
        weights: { hp: 0.30, strength: 0.25, dexterity: 0.45 },
        unlocked: false,
        unlock: "Find the duelist in an evasive enemy biome.",
        role: "Reliability and crit tempo, paid for with lower bulk."
      },
      warder: {
        name: "Warder",
        weaponPreset: "sword",
        weights: { hp: 0.45, strength: 0.30, dexterity: 0.25 },
        unlocked: false,
        unlock: "Survive a boss while critically wounded.",
        role: "Defensive character for players who want a wider HP buffer."
      }
    };

    let selectedCharacterId = "balancedSwordsman";

    function activeCharacter() {
      return CHARACTER_ROSTER[selectedCharacterId] || CHARACTER_ROSTER.balancedSwordsman;
    }

    function activeAbility() {
      return activeCharacter().ability || null;
    }

    function maxManaForPlayer() {
      return TACTICAL.maxMana;
    }

    function startingManaForPlayer() {
      return Math.min(maxManaForPlayer(), TACTICAL.startingMana);
    }

    function actionManaCost(action) {
      if (action === "attack") return TACTICAL.attackManaCost;
      if (action === "heavy") return TACTICAL.heavyManaCost;
      if (action === "quick") return TACTICAL.quickManaCost;
      if (action === "sweep") return TACTICAL.sweepManaCost;
      if (action === "guard") return TACTICAL.guardManaCost;
      if (action === "ability") return activeAbility()?.manaCost || 0;
      return 0;
    }

    function canAffordAction(action) {
      return (state.player.mana || 0) >= actionManaCost(action);
    }

    function restoreMana(amount = TACTICAL.manaRegenPerRound) {
      const before = state.player.mana || 0;
      state.player.mana = Math.min(state.player.maxMana, before + amount);
      return state.player.mana - before;
    }

    function makeStarterWeapon(preset = activeCharacter().weaponPreset) {
      const weapon = { ...BASE_WEAPON };
      if (preset === "sword") return weapon;
      if (preset === "rapier") {
        weapon.name = "Needle Rapier";

    function clamp(value, lower, upper) {
