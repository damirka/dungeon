    function encounterPowerLevel(level, slot) {
      if (level === 1 && slot === 0) return 1;
      const slotCount = Math.max(1, DUNGEON.encountersPerLevel - 1);
      let power = 1 + Math.floor((slot / slotCount) * 3) + Math.floor(Math.max(0, level - 2) / 2);
      if (Math.random() < 0.24) {
        power += Math.random() < 0.5 ? -1 : 1;
      }
      return Math.round(clamp(power, 1, Math.min(5, level + 2)));
    }

    function supportArchetypeKey(leadKey, band, powerLevel) {
      if (Math.random() >= band.mixedSupportChance) return leadKey;
      const weights = powerProfileWeights(powerLevel, 1);
      weights[leadKey] = 0;
      return weightedChoiceFromMap(weights);
    }

    function normalizedTags(tags) {
      if (!tags) return [];
      return Array.isArray(tags) ? tags : [tags];
    }

    function taggedEnemy(enemy, tags) {
      return {
        ...enemy,
        tags: [...enemy.tags, ...normalizedTags(tags)]
      };
    }

    function makeEnemy(level, key, isBoss, variant = 0) {
      const arch = ARCHETYPES[key];
      const levelIndex = level - 1;
      let maxHp = ENEMY_CURVE.baseHp * Math.pow(ENEMY_CURVE.hpGrowth, levelIndex) * arch.hpFactor;
      let damage = ENEMY_CURVE.baseDamage * Math.pow(ENEMY_CURVE.damageGrowth, levelIndex) * arch.damageFactor;
      let accuracy = ENEMY_CURVE.baseAccuracy + ENEMY_CURVE.accuracyGrowthPerLevel * levelIndex + arch.accuracyDelta;
      let evasion = ENEMY_CURVE.baseEvasion * Math.pow(ENEMY_CURVE.evasionGrowth, levelIndex) * arch.evasionFactor;
      const visual = visualForEnemy(level, key, isBoss, variant);
      const visualName = visual?.name || arch.name;
      const tags = [...arch.tags];
      let name = `L${level} ${visualName}`;
      if (isBoss) {
        maxHp *= ENEMY_CURVE.bossHpMultiplier;
        damage *= ENEMY_CURVE.bossDamageMultiplier;
        accuracy += ENEMY_CURVE.bossAccuracyBonus;
        evasion *= ENEMY_CURVE.bossEvasionMultiplier;
        tags.push("boss");
        name = `L${level} Boss ${visualName}`;
      }
      return {
        name,
        level,
        archetype: key,
        visualId: visual?.id || "",
        visualFrame: visualFrame(visual),
        maxHp: Number(maxHp.toFixed(2)),
        hp: Number(maxHp.toFixed(2)),
        damage: Number(damage.toFixed(2)),
        accuracy: clamp(accuracy, 0.35, 0.92),
        evasion: Number(evasion.toFixed(2)),
        tags,
        intent: "strike",
        aimed: false,
        interrupted: false,
        sunder: 0,
        shield: 0,
        shieldTurns: 0,
        invisible: false,
        invisibleTurns: 0
      };
    }

    function scaleEnemy(enemy, suffix, hpFactor, damageFactor, accuracyDelta, evasionFactor, tags) {
      return {
        ...enemy,
        name: `${enemy.name} ${suffix}`,
        maxHp: Number((enemy.maxHp * hpFactor).toFixed(2)),
        hp: Number((enemy.maxHp * hpFactor).toFixed(2)),
        damage: Number((enemy.damage * damageFactor).toFixed(2)),
        accuracy: clamp(enemy.accuracy + accuracyDelta, 0.35, 0.92),
        evasion: Number((enemy.evasion * evasionFactor).toFixed(2)),
        tags: [...enemy.tags, ...normalizedTags(tags)],
        aimed: false,
        interrupted: false,
        sunder: 0,
        shield: 0,
        shieldTurns: 0,
        invisible: false,
        invisibleTurns: 0
      };
    }

    function buildPowerRoom(level, slot) {
      const powerLevel = encounterPowerLevel(level, slot);
      const band = POWER_BANDS[powerLevel];
      const powerTags = [`power-${powerLevel}`];
      const leadKey = weightedChoiceFromMap(powerProfileWeights(powerLevel, level));
      if (band.enemyCount === 1) {
        return {
          level,
          isBoss: false,
          powerLevel,
          enemies: [
            taggedEnemy(
              makeEnemy(level, leadKey, false, randomVisualVariant(level, slot)),
              [...band.leadTags, ...powerTags]
            )
          ]
        };
      }

      const lead = scaleEnemy(
        makeEnemy(level, leadKey, false, randomVisualVariant(level, slot * 2)),
        "Lead",
        band.leadHpFactor,
        band.leadDamageFactor,
        0,
        1,
        ["group-primary", ...band.leadTags, ...powerTags]
      );
      const enemies = [lead];

      for (let supportIndex = 1; supportIndex < band.enemyCount; supportIndex += 1) {
        const supportKey = supportArchetypeKey(leadKey, band, powerLevel);
        const useMage = level >= 2 && Math.random() < band.mageChance;
        const support = makeEnemy(level, supportKey, false, randomVisualVariant(level, slot * 3 + supportIndex));
        if (useMage) {
          enemies.push(scaleEnemy(
            support,
            "Mage",
            TACTICAL.mageSupportHpFactor,
            TACTICAL.mageSupportDamageFactor,
            TACTICAL.mageSupportAccuracyDelta,
            TACTICAL.mageSupportEvasionFactor,
            ["group-support", "mage-support", ...powerTags]
          ));
        } else {
          const sizeFactor = supportIndex > 1 ? 0.88 : 1;
          enemies.push(scaleEnemy(
            support,
            "Support",
            band.supportHpFactor * sizeFactor,
            band.supportDamageFactor * sizeFactor,
            0.03,
            1.08,
            ["group-support", ...powerTags]
          ));
        }
      }

      return { level, isBoss: false, powerLevel, enemies };
    }

    function buildDungeon() {
      const rooms = [];
      for (let level = 1; level <= DUNGEON.levels; level += 1) {
        for (let slot = 0; slot < DUNGEON.encountersPerLevel; slot += 1) {
          rooms.push(buildPowerRoom(level, slot));
        }
        const bossKey = bossArchetypeKey(level);
        rooms.push({ level, isBoss: true, enemies: [makeEnemy(level, bossKey, true, level)] });
      }
      return rooms;
    }

    let dungeon = [];

    function indexPriority(index, casterIndex) {
      return index === casterIndex ? 0 : 1;
    }

    function supportHealTarget(enemies, casterIndex) {
      const candidates = enemies
        .map((enemy, index) => ({ enemy, index }))
        .filter(({ enemy, index }) =>
          index !== casterIndex
          && enemy.hp > 0
          && enemy.hp < enemy.maxHp * TACTICAL.supportHealThreshold
        );
      if (!candidates.length) return null;
      return candidates.reduce((best, current) =>
        (current.enemy.maxHp - current.enemy.hp) > (best.enemy.maxHp - best.enemy.hp) ? current : best
      ).index;
    }

    function supportShieldTarget(enemies, casterIndex) {
      const candidates = enemies
        .map((enemy, index) => ({ enemy, index }))
        .filter(({ enemy }) =>
          enemy.hp > 0
          && (enemy.shield || 0) < enemy.maxHp * TACTICAL.supportShieldMaxHpFraction
        );
      if (!candidates.length) return null;
      return candidates.reduce((best, current) => {
        const bestScore = [
          indexPriority(best.index, casterIndex),
          best.enemy.maxHp * TACTICAL.supportShieldMaxHpFraction - (best.enemy.shield || 0)
        ];
        const currentScore = [
          indexPriority(current.index, casterIndex),
          current.enemy.maxHp * TACTICAL.supportShieldMaxHpFraction - (current.enemy.shield || 0)
        ];
        return currentScore[0] > bestScore[0] || (currentScore[0] === bestScore[0] && currentScore[1] > bestScore[1])
          ? current
          : best;
      }).index;
    }

    function supportInvisibilityTarget(enemies, casterIndex) {
      const candidates = enemies
        .map((enemy, index) => ({ enemy, index }))
        .filter(({ enemy }) => enemy.hp > 0 && !enemy.invisible);
      if (!candidates.length) return null;
      return candidates.reduce((best, current) => {
        const bestScore = [indexPriority(best.index, casterIndex), best.enemy.maxHp - best.enemy.hp];
        const currentScore = [indexPriority(current.index, casterIndex), current.enemy.maxHp - current.enemy.hp];
        return currentScore[0] > bestScore[0] || (currentScore[0] === bestScore[0] && currentScore[1] > bestScore[1])
          ? current
          : best;
      }).index;
    }

    function weightedIntentChoice(candidates) {
      const total = candidates.reduce((sum, candidate) => sum + candidate.weight, 0);
      let roll = Math.random() * total;
      for (const candidate of candidates) {
        roll -= candidate.weight;
        if (roll <= 0) return candidate.intent;
      }
      return candidates[candidates.length - 1]?.intent || "strike";
    }

    function chooseIntent(enemy, round, allies = state.enemies, casterIndex = state.enemies.indexOf(enemy)) {
      const tags = new Set(enemy.tags);
      if (tags.has("boss")) {
        return ["heavy", "strike", "pierce", "aim", "heavy", "strike"][(round - 1) % 6];
      }
      if (tags.has("mage-support")) {
        const candidates = [
          { intent: "shield", weight: 0.30 },
          { intent: "invisibility", weight: 0.20 },
          { intent: "strike", weight: 0.22 },
          { intent: "aim", weight: 0.10 }
        ];
        if (supportHealTarget(allies, casterIndex) !== null) {
          candidates.unshift({ intent: "heal", weight: 0.34 });
        }
        return weightedIntentChoice(candidates.filter(candidate => {
          if (candidate.intent === "shield") return supportShieldTarget(allies, casterIndex) !== null;
          if (candidate.intent === "invisibility") return supportInvisibilityTarget(allies, casterIndex) !== null;
          return true;
        }));
      }
      const roll = Math.random();
      if (tags.has("hp-check")) {
        if (roll < 0.42) return "heavy";
        if (roll < 0.80) return "strike";
        return "guard";
      }
      if (tags.has("dex-check")) {
        if (roll < 0.34) return "pierce";
        if (roll < 0.68) return "strike";
        if (roll < 0.90) return "aim";
        return "guard";
      }
      if (tags.has("burst-check")) {
        if (roll < 0.38) return "strike";
        if (roll < 0.66) return "pierce";
        if (roll < 0.88) return "heavy";
        return "aim";
      }
      if (roll < 0.50) return "strike";
      if (roll < 0.72) return "heavy";
      if (roll < 0.88) return "guard";
      return "aim";
    }

    function startRoom() {
      const room = dungeon[state.roomIndex];
      if (!room) {
        state.phase = "won";
        log("Dungeon cleared.", "good");
        render();
        return;
      }
      if (!state.levelPool || state.levelPool.level !== room.level) {
        state.levelPool = {
          level: room.level,
          remaining: LOOT.baseLuckPool * Math.pow(LOOT.luckPoolGrowth, room.level - 1)
        };
      }
      state.phase = "combat";
      state.round = 1;
      state.selected = 0;
      state.player.maxMana = maxManaForPlayer();
      state.player.mana = startingManaForPlayer();
      state.player.abilityCharges = activeAbility()?.charges || 0;
      state.enemies = room.enemies.map(enemy => ({
        ...enemy,
        hp: enemy.maxHp,
        intent: "strike",
        aimed: false,
        interrupted: false,
        sunder: 0,
        shield: 0,
        shieldTurns: 0,
        invisible: false,
        invisibleTurns: 0
      }));
      state.enemies.forEach((enemy, index) => {
        enemy.intent = chooseIntent(enemy, 1, state.enemies, index);
      });
      const powerText = room.powerLevel ? ` · ${powerBandLabel(room.powerLevel)}` : "";
      log(`Entered R${state.roomIndex + 1}: ${room.isBoss ? "Boss" : "Encounter"}${powerText}.`);
      render();
    }

    function playerBaseDamage() {
      return Math.max(0, COMBAT.basePlayerDamage + COMBAT.strengthDamageScale * Math.pow(Math.max(0, state.player.strength), COMBAT.strengthDamageExponent)) * state.player.weapon.damageMultiplier;
    }

    function heavyEvasionHitPenalty(enemy) {
      return clamp(
        (enemy.evasion - TACTICAL.heavyEvasionHitPenaltyFloor) * TACTICAL.heavyEvasionHitPenaltyScale,
        0,
        TACTICAL.heavyEvasionHitPenaltyMax
      );
    }

    function playerHitChance(enemy, action) {
      const dexBonus = COMBAT.dexterityHitScale * Math.pow(Math.max(0, state.player.dexterity), COMBAT.dexterityHitExponent);
      const evasionPenalty = COMBAT.enemyEvasionHitScale * Math.pow(Math.max(0, enemy.evasion), COMBAT.enemyEvasionExponent);
      let value = COMBAT.basePlayerHitChance + dexBonus - evasionPenalty + state.player.weapon.hitModifier;
      if (action === "heavy") value += TACTICAL.heavyHitModifier - heavyEvasionHitPenalty(enemy);
      if (action === "quick") value += TACTICAL.quickHitModifier;
      if (action === "sweep") value += TACTICAL.sweepHitModifier;
      if (enemy.invisible) value -= TACTICAL.supportInvisibilityHitPenalty;
      return clamp(value, COMBAT.minPlayerHitChance, COMBAT.maxPlayerHitChance);
    }

    function playerCritChance(enemy, action) {
      const dexBonus = COMBAT.dexterityCritScale * Math.pow(Math.max(0, state.player.dexterity), COMBAT.dexterityCritExponent);
      const evasionPenalty = COMBAT.enemyEvasionCritScale * Math.sqrt(Math.max(0, enemy.evasion));
      let value = COMBAT.baseCritChance + dexBonus - evasionPenalty + state.player.weapon.critModifier;
      if (action === "quick") value += TACTICAL.quickCritModifier;
      return clamp(value, 0, COMBAT.maxCritChance);
    }

    function playerDamageQuality(enemy, action) {
      const dexBonus = COMBAT.dexterityDamageQualityScale * Math.pow(Math.max(0, state.player.dexterity), COMBAT.dexterityDamageQualityExponent);
      const evasionPenalty = COMBAT.enemyEvasionDamageQualityScale * Math.pow(Math.max(0, enemy.evasion), COMBAT.enemyEvasionDamageQualityExponent);
      const quick = action === "quick" ? TACTICAL.quickQualityBonus : 0;
      const sweep = action === "sweep" ? TACTICAL.sweepQualityBonus : 0;
      return clamp(dexBonus - evasionPenalty + quick + sweep + (state.player.weapon.damageQualityModifier || 0), 0, 1);
    }

    function variedDamage(base, quality = 0) {
      const low = 1 - COMBAT.damageVariance;
      const high = 1 + COMBAT.damageVariance;
      const roll = low + Math.random() * COMBAT.damageVariance * 2;
      return base * (roll + (high - roll) * clamp(quality, 0, 1));
    }

    function enemyIntentDamage(enemy) {
      const map = {
        strike: TACTICAL.strikeDamageMultiplier,
        heavy: TACTICAL.heavyIntentDamageMultiplier,
        pierce: TACTICAL.pierceDamageMultiplier,
        guard: 0,
        aim: 0,
        heal: 0,
        shield: 0,
        invisibility: 0
      };
      let multiplier = map[enemy.intent] || 0;
      if (enemy.aimed && multiplier > 0) multiplier += TACTICAL.aimDamageBonus;
      return enemy.damage * multiplier;
    }

    function doubleStrikeChance() {
      return clamp(
        TACTICAL.doubleStrikeBaseChance
        + state.player.dexterity * TACTICAL.doubleStrikePerDexterity
        + (state.player.weapon.doubleStrikeChanceModifier || 0),
        0,
        TACTICAL.maxDoubleStrikeChance
      );
    }

    function interruptChance() {
      return clamp(TACTICAL.quickInterruptBaseChance + state.player.dexterity * TACTICAL.quickInterruptPerDexterity, 0, TACTICAL.maxInterruptChance);
    }

    function abilityHasCharges() {
      return Boolean(activeAbility()) && (state.player.abilityCharges || 0) > 0;
    }

    function abilityAvailable() {
      return abilityHasCharges() && canAffordAction("ability");
    }

    function ripostePriorityEnemy(enemy) {
      return Boolean(enemy?.tags?.some(tag => ["boss", "elite", "tank", "hp-check"].includes(tag)));
    }

    function riposteAutoAvailable(enemies = state.enemies) {
      const ability = activeAbility();
      if (!abilityAvailable()) return false;
      if ((ability?.manaCost || 0) <= 0) return true;
      return enemies.some(enemy => enemy.hp > 0 && ripostePriorityEnemy(enemy));
    }

    function abilityGuardReduction(enemy) {
      const ability = activeAbility();
      if (!ability) return 0;
      if (enemy.intent === "pierce") return ability.pierceGuardReduction ?? TACTICAL.pierceGuardReduction;
      return ability.guardReduction || 0;
    }

    function abilityComment(ability = activeAbility()) {
      if (!ability) return "No class ability learned.";
      const normal = pct(ability.guardReduction || 0);
      const pierce = pct(ability.pierceGuardReduction ?? TACTICAL.pierceGuardReduction);
      return `Riposte: ${normal} less incoming · counter once · ${pierce} vs pierce`;
    }

    function quickPressureNote(target) {
      if (target?.intent === "heavy") return "Pressure: interrupt Heavy · double strike";
      if (target?.tags?.includes("boss")) return "Pressure: reliable boss poke · double strike";
      return "Pressure: reliable tempo · double strike";
    }

    function actionDamageMultiplier(action) {
      if (action === "heavy") return TACTICAL.heavyDamageMultiplier * (state.player.weapon.heavyDamageMultiplier || 1);
      if (action === "quick") return TACTICAL.quickDamageMultiplier * (state.player.weapon.quickDamageMultiplier || 1);
      if (action === "sweep") {
        const dexterityBonus = clamp(
          (state.player.dexterity - STATS.baseDexterity) * TACTICAL.sweepDexterityDamagePerPoint,
          0,
          TACTICAL.sweepMaxDexterityDamageBonus
        );
        return (TACTICAL.sweepDamageMultiplier + dexterityBonus) * (state.player.weapon.sweepDamageMultiplier || 1);
      }
      return TACTICAL.attackDamageMultiplier * (state.player.weapon.attackDamageMultiplier || 1);
    }

    function contextualWeaponDamageMultiplier(enemy) {
      let multiplier = 1;
      if (enemy?.tags?.includes("boss")) multiplier *= state.player.weapon.bossDamageMultiplier || 1;
      if (enemy?.maxHp > 0 && enemy.hp / enemy.maxHp <= (state.player.weapon.executeHpThreshold || 0.35)) {
        multiplier *= state.player.weapon.executeDamageMultiplier || 1;
      }
      if (state.round === 1) multiplier *= state.player.weapon.firstStrikeDamageMultiplier || 1;
      return multiplier;
    }

    function actionGlancingDamageMultiplier(action) {
      if (action === "heavy") return TACTICAL.heavyGlancingDamageMultiplier;
      if (action === "quick") return TACTICAL.quickGlancingDamageMultiplier;
      if (action === "sweep") return TACTICAL.sweepGlancingDamageMultiplier;
      if (action === "attack") return TACTICAL.attackGlancingDamageMultiplier;
      return 0;
    }

    function sunderEffectiveness(action) {
      if (action === "sweep" || action === "guard" || action === "ability") return 0;
      if (action === "quick") return TACTICAL.sunderQuickEffectiveness;
      if (action === "heavy") return TACTICAL.sunderHeavyEffectiveness;
      return 1;
    }

    function sunderDamageMultiplier(enemy, action) {
      if (!enemy || !enemy.sunder || action === "sweep" || action === "guard" || action === "ability") return 1;
      const perStack = TACTICAL.sunderDamageBonusPerStack + (state.player.weapon.sunderBonusPerStack || 0);
      return 1 + enemy.sunder * perStack * sunderEffectiveness(action);
    }

    function sunderAddedByAction(action) {
      if (action === "attack") return state.player.weapon.sunderOnHit || 0;
      if (action === "heavy") return (state.player.weapon.sunderOnHit || 0) + (state.player.weapon.sunderOnHeavyHit || 0);
      return 0;
    }

    function expectedPlayerDamage(enemy, action, strikeMultiplier = 1, canCrit = true) {
      if (!enemy || enemy.hp <= 0 || action === "guard" || action === "ability") return 0;
      const hit = playerHitChance(enemy, action);
      const crit = canCrit && action !== "sweep" ? playerCritChance(enemy, action) : 0;
      const quality = playerDamageQuality(enemy, action);
      let damage = playerBaseDamage()
        * actionDamageMultiplier(action)
        * sunderDamageMultiplier(enemy, action)
        * contextualWeaponDamageMultiplier(enemy)
        * strikeMultiplier;
      if (action !== "sweep") damage *= 1 + (state.player.weapon.onHitBonusDamage || 0);
      if (enemy.intent === "guard") {
        let reduction = TACTICAL.enemyGuardReduction;
        if (action === "heavy") reduction *= 1 - TACTICAL.heavyGuardIgnore;
        damage *= 1 - reduction;
      }
      const expectedDamage = damage * (1 + COMBAT.damageVariance * quality);
      const critFactor = 1 + crit * ((COMBAT.critMultiplier + state.player.weapon.critMultiplierModifier) - 1);
      return expectedDamage * (hit * critFactor + (1 - hit) * actionGlancingDamageMultiplier(action));
    }

    function expectedSweepDamage() {
      return state.enemies.reduce((sum, enemy) => {
        if (enemy.hp <= 0) return sum;
        return sum + expectedPlayerDamage(enemy, "sweep");
      }, 0);
    }

    function expectedIncomingDamage(defense = false) {
      const guarding = defense === true || defense === "guard";
      const usingAbility = defense === "ability";
      return state.enemies.reduce((sum, enemy) => {
        if (enemy.hp <= 0 || enemy.interrupted || enemy.intent === "aim" || enemy.intent === "guard") return sum;
        let incoming = enemyIntentDamage(enemy);
        if (usingAbility) {
          incoming *= 1 - abilityGuardReduction(enemy);
        } else if (guarding) {
          const reduction = enemy.intent === "pierce" ? TACTICAL.pierceGuardReduction : TACTICAL.playerGuardReduction;
          incoming *= 1 - reduction;
        }
        return sum + incoming;
      }, 0);
    }

    function applyDamageToEnemy(enemy, damage) {
      const blocked = Math.min(enemy.shield || 0, Math.max(0, damage));
      enemy.shield = Math.max(0, (enemy.shield || 0) - blocked);
      enemy.hp = Math.max(0, enemy.hp - Math.max(0, damage - blocked));
      return blocked;
    }

    function expirePlayerTurnStatuses() {
      state.enemies.forEach(enemy => {
        if (enemy.shieldTurns > 0) {
          enemy.shieldTurns -= 1;
          if (enemy.shieldTurns <= 0) enemy.shield = 0;
        }
        if (enemy.invisibleTurns > 0) {
          enemy.invisibleTurns -= 1;
          enemy.invisible = enemy.invisibleTurns > 0;
        }
      });
    }

    function resolveStrike(enemy, action, multiplier = 1, canCrit = true, label = null) {
      const hit = playerHitChance(enemy, action);
      const hitRoll = Math.random();
      const landed = hitRoll <= hit;
      const rollText = `roll ${pctDetail(hitRoll)} / ${pctDetail(hit)}`;
      const actionName = label || actionLogName(action);
      const grazeMultiplier = landed ? 1 : actionGlancingDamageMultiplier(action);
      let damage = variedDamage(
        playerBaseDamage()
          * actionDamageMultiplier(action)
          * sunderDamageMultiplier(enemy, action)
          * contextualWeaponDamageMultiplier(enemy)
          * (action !== "sweep" ? 1 + (state.player.weapon.onHitBonusDamage || 0) : 1)
          * multiplier
          * grazeMultiplier,
        playerDamageQuality(enemy, action)
      );
      if (enemy.intent === "guard") {
        let reduction = TACTICAL.enemyGuardReduction;
        if (action === "heavy") reduction *= 1 - TACTICAL.heavyGuardIgnore;
        damage *= 1 - reduction;
      }
      const crit = landed && action !== "sweep" && canCrit && Math.random() <= playerCritChance(enemy, action);
      if (crit) damage *= COMBAT.critMultiplier + state.player.weapon.critMultiplierModifier;
      const blocked = applyDamageToEnemy(enemy, damage);
      const sunderAdded = landed ? sunderAddedByAction(action) : 0;
      if (sunderAdded > 0 && enemy.hp > 0) {
        enemy.sunder = Math.min(TACTICAL.sunderMaxStacks, (enemy.sunder || 0) + sunderAdded);
      }
      const stunned = action === "heavy"
        && landed
        && enemy.hp > 0
        && (state.player.weapon.stunOnHeavyHitChance || 0) > 0
        && Math.random() <= state.player.weapon.stunOnHeavyHitChance;
      const staggered = landed
        && enemy.hp > 0
        && (state.player.weapon.staggerOnHitChance || 0) > 0
        && Math.random() <= state.player.weapon.staggerOnHitChance;
      const frozen = landed
        && enemy.hp > 0
        && (state.player.weapon.freezeOnHitChance || 0) > 0
        && Math.random() <= state.player.weapon.freezeOnHitChance;
      if (stunned || staggered || frozen) enemy.interrupted = true;
      const verb = action === "sweep" ? (landed ? "struck" : "grazed") : (landed ? "hit" : "grazed");
      const sunderText = sunderAdded > 0 && enemy.hp > 0 ? ` · Sunder ${enemy.sunder}` : "";
      const stunText = stunned ? " · stunned" : staggered ? " · staggered" : frozen ? " · frozen" : "";
      const shieldText = blocked > 0 ? ` · ${humanDamage(blocked)} blocked` : "";
      log(`${actionName} ${verb} ${enemy.name} for ${humanDamage(damage)} (${rollText})${crit ? " crit" : ""}${shieldText}${sunderText}${stunText}.`);
      state.debug.damageDealt += damage;
      return damage;
    }

    function resolveSweep() {
      let total = 0;
      state.enemies.forEach(enemy => {
        if (enemy.hp <= 0) return;
        total += resolveStrike(enemy, "sweep");
      });
      if (total > 0) log(`Sweep total: ${humanDamage(total)}.`, "good");
    }

    function resolveRiposte(enemy, ability) {
      const damage = resolveStrike(enemy, "attack", ability.counterDamageMultiplier || 0.82, true, "Riposte");
      if (damage > 0) {
        enemy.riposted = true;
      }
      return damage;
    }

    function useAction(action) {
      if (state.phase !== "combat" || state.player.hp <= 0) return;
      const alive = state.enemies.filter(enemy => enemy.hp > 0);
      if (!alive.length) return;
      state.enemies.forEach(enemy => {
        enemy.riposted = false;
      });
      if (action === "ability" && !abilityHasCharges()) {
        log("No class ability charges left.", "warn");
        render();
        return;
      }
      if (!canAffordAction(action)) {
        log(`${actionLogName(action)} needs ${actionManaCost(action)} MP.`, "warn");
        render();
        return;
      }
      if (state.debug.actions[action] !== undefined) {
        state.debug.actions[action] += 1;
      }
      state.player.mana = Math.max(0, state.player.mana - actionManaCost(action));

      if (action === "sweep") {
        resolveSweep();
      } else if (action === "ability") {
        const ability = activeAbility();
        state.player.abilityCharges = Math.max(0, (state.player.abilityCharges || 0) - 1);
        log(`${ability.name}: ${abilityComment(ability)}.`, "good");
      } else if (action !== "guard") {
        let target = state.enemies[state.selected];
        if (!target || target.hp <= 0) {
          const nextIndex = state.enemies.findIndex(enemy => enemy.hp > 0);
          state.selected = Math.max(0, nextIndex);
          target = state.enemies[state.selected];
        }
        resolveStrike(target, action);
        if (target.hp > 0 && action === "quick" && Math.random() <= doubleStrikeChance()) {
          resolveStrike(target, action, TACTICAL.doubleStrikeDamageMultiplier, false);
        }
        if (target.hp > 0 && action === "quick" && target.intent === "heavy" && Math.random() <= interruptChance()) {
          target.interrupted = true;
          log(`${target.name} was interrupted.`, "good");
        }
      } else {
        log("Guard raised.", "good");
      }

      if (state.enemies.every(enemy => enemy.hp <= 0)) {
        clearRoom();
        return;
      }

      resolveEnemies(action);
      if (state.player.hp <= 0) {
        state.phase = "dead";
        log("Run ended.", "bad");
        render();
        return;
      }
      restoreMana();
      state.round += 1;
      state.enemies.forEach((enemy, index) => {
        if (enemy.hp <= 0) return;
        if (enemy.interrupted) {
          enemy.interrupted = false;
          enemy.aimed = false;
          enemy.intent = chooseIntent(enemy, state.round, state.enemies, index);
          return;
        }
        if (enemy.intent === "aim") {
          enemy.aimed = true;
        } else {
          enemy.aimed = false;
        }
        enemy.intent = chooseIntent(enemy, state.round, state.enemies, index);
      });
      render();
    }

    function resolveEnemies(action) {
      expirePlayerTurnStatuses();
      const ability = activeAbility();
      let riposteTriggers = action === "ability" ? (ability?.counterTriggers || 0) : 0;
      state.enemies.forEach((enemy, index) => {
        if (enemy.hp <= 0 || enemy.interrupted) return;
        if (enemy.intent === "aim" || enemy.intent === "guard") {
          log(`${enemy.name} used ${enemy.intent}.`);
          return;
        }
        if (enemy.intent === "heal") {
          const targetIndex = supportHealTarget(state.enemies, index);
          if (targetIndex !== null) {
            const target = state.enemies[targetIndex];
            const amount = enemy.damage * TACTICAL.supportHealDamageMultiplier;
            const before = target.hp;
            target.hp = Math.min(target.maxHp, target.hp + amount);
            log(`${enemy.name} healed ${target.name} for ${humanHp(target.hp - before)}.`, "good");
          }
          return;
        }
        if (enemy.intent === "shield") {
          const targetIndex = supportShieldTarget(state.enemies, index);
          if (targetIndex !== null) {
            const target = state.enemies[targetIndex];
            const maxShield = target.maxHp * TACTICAL.supportShieldMaxHpFraction;
            const amount = enemy.damage * TACTICAL.supportShieldDamageMultiplier;
            const before = target.shield || 0;
            target.shield = Math.min(maxShield, before + amount);
            target.shieldTurns = 1;
            log(`${enemy.name} shielded ${target.name} for ${humanHp(target.shield - before)}.`, "good");
          }
          return;
        }
        if (enemy.intent === "invisibility") {
          const targetIndex = supportInvisibilityTarget(state.enemies, index);
          if (targetIndex !== null) {
            const target = state.enemies[targetIndex];
            target.invisible = true;
            target.invisibleTurns = 1;
            log(`${enemy.name} hid ${target.name}.`, "warn");
          }
          return;
        }
        let damage = variedDamage(enemyIntentDamage(enemy));
        if (action === "ability") {
          damage *= 1 - abilityGuardReduction(enemy);
        } else if (action === "guard") {
          const reduction = enemy.intent === "pierce" ? TACTICAL.pierceGuardReduction : TACTICAL.playerGuardReduction;
          damage *= 1 - reduction;
        }
        state.player.hp = Math.max(0, state.player.hp - damage);
        state.debug.damageTaken += damage;
        log(`${enemy.name} dealt ${humanDamage(damage)}.`);
        if (action === "ability" && ability && riposteTriggers > 0 && state.player.hp > 0 && enemy.hp > 0) {
          riposteTriggers -= 1;
          resolveRiposte(enemy, ability);
        }
      });
    }

    function clearRoom() {
      const room = dungeon[state.roomIndex];
      log(`Cleared R${state.roomIndex + 1}.`, "good");
      state.debug.roomsCleared += 1;
      applyTrainingGain(room);
      applyPassiveRoomHealing(room);
      if (room.isBoss && room.level >= 5) {
        state.roomIndex += 1;
        state.phase = "won";
        log("Dungeon cleared.", "good");
        render();
        return;
      }
      state.phase = "loot";
      state.draft = generateLootDraft(room);
      render();
    }

    function spendLuck(room) {
      const share = room.isBoss ? LOOT.bossLuckShare : LOOT.normalLuckShare;
      const target = LOOT.baseLuckPool * Math.pow(LOOT.luckPoolGrowth, room.level - 1) * share;
      const varied = target * (1 - LOOT.luckVariance + Math.random() * LOOT.luckVariance * 2);
      const spend = Math.min(state.levelPool.remaining, Math.max(LOOT.commonCost, varied));
      state.levelPool.remaining = Math.max(0, state.levelPool.remaining - spend);
      return spend;
    }

    function rarity(power, isUnique = false) {
      if (isUnique) return "unique";
      if (power >= LOOT.legendaryCost) return "legendary";
      if (power >= LOOT.epicCost) return "epic";
      if (power >= LOOT.veryRareCost) return "very rare";
      if (power >= LOOT.rareCost) return "rare";
      if (power >= LOOT.uncommonCost) return "uncommon";
      return "common";
    }

    function tier(power) {
      if (power >= LOOT.legendaryCost) return 6;
      if (power >= LOOT.epicCost) return 5;
      if (power >= LOOT.veryRareCost) return 4;
      if (power >= LOOT.rareCost) return 3;
      if (power >= LOOT.uncommonCost) return 2;
      return 1;
    }

    function rarityClass(item) {
      return (item.rarity || rarity(item.power, item.isUnique)).replace(/\s+/g, "-");
    }

    function weightedChoice(weightedValues) {
      const total = weightedValues.reduce((sum, item) => sum + Math.max(0, item.weight), 0);
      let roll = Math.random() * total;
      for (const item of weightedValues) {
        roll -= Math.max(0, item.weight);
        if (roll <= 0) return item.value;
      }
      return weightedValues[weightedValues.length - 1].value;
    }

    function draftFocus(room) {
      const chance = LOOT.focusDraftChance + (room.level <= 2 ? LOOT.earlyFocusDraftBonus : 0);
      if (Math.random() > chance) return null;
      return Math.random() < 0.5 ? "strength" : "dexterity";
    }

    function generateLootDraft(room) {
      const spend = spendLuck(room);
      const focus = draftFocus(room);
      const draft = [];
      const usedKeys = new Set();
      while (draft.length < 3) {
        const availableKinds = availableLootKinds(usedKeys);
        if (!availableKinds.length) break;
        const rolled = rollOptionPower(spend);
        const power = rolled.power;
        const isUnique = rolled.isUnique;
        const kind = weightedChoice(availableKinds);
        let item = null;
        if (kind === "weapon") {
          item = makeWeaponItem(power, focus, isUnique, usedKeys);
        } else if (kind === "consumable") {
          item = makePotionItem(power, isUnique);
        } else {
          const stat = chooseStatTarget(focus, usedKeys);
          item = stat ? makeStatItem(stat, power, isUnique) : null;
        }
        if (!item) continue;
        draft.push(item);
        usedKeys.add(choiceIdentity(item));
      }
      return draft;
    }

    function choiceIdentity(item) {
      if (item.kind === "stat") return `stat:${item.stat}`;
      if (item.kind === "consumable") return `instant:${item.effect}`;
      if (item.kind === "weapon") return `weapon:${item.style}`;
      return `${item.kind}:${item.name}`;
    }

    function availableStatTargets(usedKeys) {
      return ["hp", "strength", "dexterity"].filter(stat => !usedKeys.has(`stat:${stat}`));
    }

    function availableWeaponStyles(usedKeys) {
      const styles = [...new Set(MAPPED_WEAPON_TEMPLATES.map(template => template.style))];
      return styles.filter(style => !usedKeys.has(`weapon:${style}`));
    }

    function availableLootKinds(usedKeys) {
      return [
        { value: "stat", weight: availableStatTargets(usedKeys).length ? LOOT.statItemWeight : 0 },
        { value: "weapon", weight: availableWeaponStyles(usedKeys).length ? LOOT.weaponItemWeight : 0 },
        { value: "consumable", weight: usedKeys.has("instant:restore_hp") ? 0 : LOOT.consumableItemWeight }
      ].filter(item => item.weight > 0);
    }

    function chooseStatTarget(focus, usedKeys) {
      const available = availableStatTargets(usedKeys);
      if (!available.length) return null;
      if (focus && available.includes(focus) && Math.random() <= LOOT.focusedStatChoiceChance) return focus;
      return weightedChoice([
        { value: "hp", weight: available.includes("hp") ? 1 : 0 },
        { value: "strength", weight: available.includes("strength") ? 1 : 0 },
        { value: "dexterity", weight: available.includes("dexterity") ? 1 : 0 }
      ].filter(item => item.weight > 0));
    }

    function rollOptionPower(spend) {
      let power = spend * (0.72 + Math.random() * 0.48);
      const roll = Math.random();
      if (roll < LOOT.uniqueOptionChance) {
        power *= LOOT.uniquePowerMultiplier;
        return { power: Math.max(0.75, power), isUnique: true };
      }
      if (roll < LOOT.uniqueOptionChance + LOOT.jackpotOptionChance) {
        power *= LOOT.jackpotPowerMultiplier;
      } else if (roll < LOOT.uniqueOptionChance + LOOT.jackpotOptionChance + LOOT.luckyOptionChance) {
        power *= LOOT.luckyPowerMultiplier;
      }
      return { power: Math.max(0.75, power), isUnique: false };
    }

    function statLootNote(stat) {
      if (stat === "hp") return "max HP buffer";
      if (stat === "strength") return "base damage and Heavy payoff";
      if (stat === "dexterity") return "crit, dodge, Quick pressure";
      return "stat upgrade";
    }

    function weaponLootNotes(item) {
      const notes = [];
      const weapon = item.weapon || {};
      if (
        item.style === "axe"
        || (weapon.heavyDamageMultiplier || 1) > 1.04
        || (weapon.sunderOnHeavyHit || 0) > 0
        || (weapon.stunOnHeavyHitChance || 0) > 0
      ) {
        notes.push("Heavy payoff");
      }
      if (
        item.style === "rapier"
        || (weapon.quickDamageMultiplier || 1) > 1.04
        || (weapon.doubleStrikeChanceModifier || 0) > 0
      ) {
        notes.push("Quick pressure");
      }
      if (
        (weapon.hitModifier || 0) > 0.01
        || (weapon.critModifier || 0) > 0.01
        || (weapon.critMultiplierModifier || 0) > 0.01
      ) {
        notes.push("precision/crit");
      }
      if (
        (weapon.staggerOnHitChance || 0) > 0
        || (weapon.freezeOnHitChance || 0) > 0
        || (weapon.onHitBonusDamage || 0) > 0
      ) {
        notes.push("on-hit control");
      }
      if (
        (weapon.bossDamageMultiplier || 1) > 1.02
        || (weapon.executeDamageMultiplier || 1) > 1.02
        || (weapon.firstStrikeDamageMultiplier || 1) > 1.02
      ) {
        notes.push("situational burst");
      }
      if (!notes.length) notes.push("steady upgrade");
      return notes.slice(0, 2).join(" · ");
    }

    function healthBottle(power, isUnique = false) {
      if (isUnique) {
        return { name: "Crimson Elixir", tier: 6, value: Math.round(LOOT.legendaryCost * LOOT.potionHpPerPower), sprite: SPRITES.crimsonElixir };
      }
      if (power >= LOOT.epicCost) {
        return { name: "Crimson Elixir", tier: 5, value: Math.round(LOOT.epicCost * LOOT.potionHpPerPower), sprite: SPRITES.crimsonElixir };
      }
      if (power >= LOOT.uncommonCost) {
        return { name: "Crimson Potion", tier: 3, value: Math.round(LOOT.rareCost * LOOT.potionHpPerPower), sprite: SPRITES.crimsonPotion };
      }
      return { name: "Crimson Vial", tier: 1, value: Math.round(LOOT.commonCost * LOOT.potionHpPerPower), sprite: SPRITES.crimsonVial };
    }

    function makeStatItem(stat, power, isUnique = false) {
      const names = {
        hp: ["Vital Amulet", STATS.hpPerPower, SPRITES.hp, "amulet"],
        strength: ["Force Ring", STATS.strengthPerPower, SPRITES.strength, "charm"],
        dexterity: ["Grace Relic", STATS.dexterityPerPower, SPRITES.dexterity, "relic"]
      };
      const uniqueNames = {
        hp: "Heartseed Amulet",
        strength: "Titan's Knot",
        dexterity: "Silkstep Charm"
      };
      const [baseName, conversion, sprite, slot] = names[stat];
      const value = conversion * power * (0.86 + Math.random() * 0.28);
      const itemRarity = rarity(power, isUnique);
      return {
        kind: "stat",
        slot,
        stat,
        value,
        power,
        isUnique,
        rarity: itemRarity,
        sprite,
        name: isUnique ? uniqueNames[stat] : `${baseName} +${tier(power)}`,
        desc: `${SLOT_LABELS[slot]} · ${humanGain(value)} ${stat.toUpperCase()} · ${itemRarity} · ${statLootNote(stat)}`
      };
    }

    function chooseWeaponStyle(focus, usedKeys = new Set()) {
      const available = new Set(availableWeaponStyles(usedKeys));
      const filter = options => options.filter(option => available.has(option.value));
      if (focus === "strength") {
        return weightedChoice(filter([
          { value: "sword", weight: 0.32 },
          { value: "axe", weight: 0.56 },
          { value: "rapier", weight: 0.12 }
        ]));
      }
      if (focus === "dexterity") {
        return weightedChoice(filter([
          { value: "sword", weight: 0.18 },
          { value: "axe", weight: 0.10 },
          { value: "rapier", weight: 0.72 }
        ]));
      }
      return weightedChoice(filter([
        { value: "sword", weight: 0.45 },
        { value: "axe", weight: 0.25 },
        { value: "rapier", weight: 0.30 }
      ]));
    }

    function makeLegacyWeaponItem(power, focus = null, isUnique = false, usedKeys = new Set()) {
      const style = chooseWeaponStyle(focus, usedKeys);
      const itemRarity = rarity(power, isUnique);
      const item = {
        kind: "weapon",
        slot: "weapon",
        power,
        isUnique,
        rarity: itemRarity,
        style,
        sprite: SPRITES[style],
        weapon: {
          name: style === "axe" ? "Heavy Axe" : style === "rapier" ? "Needle Rapier" : "Balanced Sword",
          damageMultiplier: 1,
          attackDamageMultiplier: 1,
          heavyDamageMultiplier: 1,
          quickDamageMultiplier: 1,
          sweepDamageMultiplier: 1,
          hitModifier: 0,
          critModifier: 0,
          critMultiplierModifier: 0,
          dexterityMultiplier: 1,
          sunderOnHit: 0,
          sunderOnHeavyHit: 0,
          sunderBonusPerStack: 0,
          stunOnHeavyHitChance: 0
        }
      };
      let effect = null;
      let effectCost = 0;
      if (style === "axe") {
        let effectChance = 0;
        if (isUnique) effectChance = 1;
        else if (power >= LOOT.epicCost) effectChance = LOOT.weaponEffectEpicChance;
        else if (power >= LOOT.rareCost) effectChance = LOOT.weaponEffectRareChance;
        else if (power >= LOOT.uncommonCost) effectChance = LOOT.weaponEffectUncommonChance;
        if (Math.random() < effectChance) {
          effect = weightedChoice([
            { value: "crushing", weight: 0.62 },
            { value: "stunning", weight: 0.38 }
          ]);
          const baseCost = effect === "crushing" ? LOOT.axeCrushEffectCost : LOOT.axeStunEffectCost;
          effectCost = Math.min(Math.max(0, power - 0.75), baseCost);
          if (effectCost <= 0) effect = null;
        }
      }
      const rawPower = Math.max(0.75, power - effectCost);
      if (style === "sword") {
        item.weapon.damageMultiplier += 0.018 * rawPower;
        item.weapon.attackDamageMultiplier += 0.004 * rawPower;
        item.weapon.heavyDamageMultiplier += 0.004 * rawPower;
        item.weapon.quickDamageMultiplier += 0.003 * rawPower;
        item.weapon.critModifier += 0.003 * rawPower;
      } else if (style === "axe") {
        item.weapon.damageMultiplier += 0.018 * rawPower;
        item.weapon.heavyDamageMultiplier += 0.040 * rawPower;
        item.weapon.quickDamageMultiplier = Math.max(0.70, item.weapon.quickDamageMultiplier - 0.012 * rawPower);
        item.weapon.sweepDamageMultiplier = Math.max(0.70, item.weapon.sweepDamageMultiplier - 0.008 * rawPower);
        item.weapon.hitModifier -= 0.006 * rawPower;
        item.weapon.dexterityMultiplier = Math.max(0.70, item.weapon.dexterityMultiplier - Math.min(0.18, 0.012 * rawPower));
        if (effect === "crushing") {
          item.weapon.name = "Crushing Heavy Axe";
          item.weapon.sunderOnHit = 1;
          item.weapon.sunderOnHeavyHit = 1;
          item.weapon.sunderBonusPerStack += 0.004 * effectCost;
        } else if (effect === "stunning") {
          item.weapon.name = "Stunning Heavy Axe";
          item.weapon.stunOnHeavyHitChance = Math.min(0.28, 0.10 + 0.04 * effectCost);
        }
      } else {
        item.weapon.damageMultiplier += 0.007 * rawPower;
        item.weapon.heavyDamageMultiplier = Math.max(0.70, item.weapon.heavyDamageMultiplier - 0.010 * rawPower);
        item.weapon.quickDamageMultiplier += 0.020 * rawPower;
        item.weapon.sweepDamageMultiplier += 0.016 * rawPower;
        item.weapon.hitModifier += 0.004 * rawPower;
        item.weapon.critModifier += 0.007 * rawPower;
        item.weapon.critMultiplierModifier += 0.010 * rawPower;
        item.weapon.dexterityMultiplier += Math.min(0.10, 0.006 * rawPower);
      }
      const uniqueNames = {
        sword: "First Oath",
        axe: "Headsman's Promise",
        rapier: "Threadneedle"
      };
      item.name = isUnique ? uniqueNames[style] : `${item.weapon.name} +${tier(power)}`;
      const effectDesc = item.weapon.sunderOnHit
        ? " · Crush: Sunder on Attack/Heavy"
        : item.weapon.stunOnHeavyHitChance
          ? ` · ${pct(item.weapon.stunOnHeavyHitChance)} heavy stun`
          : "";
      item.desc = `${humanGain((item.weapon.damageMultiplier - 1) * 100)}% damage · ${itemRarity}${effectDesc} · ${weaponLootNotes(item)}`;
      return item;
    }

    function mappedWeaponTemplatesForStyle(style) {
      return MAPPED_WEAPON_TEMPLATES.filter(template => template.style === style);
    }

    function makeMappedWeaponShell(template, power, itemRarity, style, isUnique) {
      return {
        kind: "weapon",
        slot: "weapon",
        power,
        isUnique,
        rarity: itemRarity,
        style,
        assetId: template.assetId,
        assetFamily: template.family,
        sprite: template.sprite,
        mappedEffects: [],
        weapon: {
          name: template.name,
          damageMultiplier: 1,
          attackDamageMultiplier: 1,
          heavyDamageMultiplier: 1,
          quickDamageMultiplier: 1,
          sweepDamageMultiplier: 1,
          hitModifier: 0,
          critModifier: 0,
          critMultiplierModifier: 0,
          dexterityMultiplier: 1,
          sunderOnHit: 0,
          sunderOnHeavyHit: 0,
          sunderBonusPerStack: 0,
          stunOnHeavyHitChance: 0,
          damageQualityModifier: 0,
          doubleStrikeChanceModifier: 0,
          staggerOnHitChance: 0,
          freezeOnHitChance: 0,
          onHitBonusDamage: 0,
          bossDamageMultiplier: 1,
          executeDamageMultiplier: 1,
          executeHpThreshold: 0.35,
          firstStrikeDamageMultiplier: 1
        },
        statBonus: { hp: 0, strength: 0, dexterity: 0 }
      };
    }

    function applyMappedWeaponEffect(item, effect, spent) {
      let value = 0;
      if (effect === "weapon_damage") {
        value = 0.020 * spent;
        item.weapon.damageMultiplier += value;
      } else if (effect === "strength") {
        value = 0.20 * spent;
        item.statBonus.strength += value;
        item.weapon.damageMultiplier += 0.006 * spent;
        item.weapon.heavyDamageMultiplier += 0.006 * spent;
      } else if (effect === "dexterity") {
        value = 0.20 * spent;
        item.statBonus.dexterity += value;
        item.weapon.hitModifier += 0.0025 * spent;
        item.weapon.quickDamageMultiplier += 0.006 * spent;
      } else if (effect === "max_hp") {
        value = 0.48 * spent;
        item.statBonus.hp += value;
      } else if (effect === "hit_chance") {
        value = 0.008 * spent;
        item.weapon.hitModifier += value;
      } else if (effect === "crit_chance") {
        value = 0.008 * spent;
        item.weapon.critModifier += value;
      } else if (effect === "crit_damage") {
        value = 0.012 * spent;
        item.weapon.critMultiplierModifier += value;
      } else if (effect === "damage_roll_quality") {
        value = 0.012 * spent;
        item.weapon.damageQualityModifier += value;
      } else if (effect === "double_strike") {
        value = 0.018 * spent;
        item.weapon.doubleStrikeChanceModifier += value;
      } else if (effect === "stagger") {
        value = 0.018 * spent;
        item.weapon.staggerOnHitChance += value;
      } else if (effect === "on_hit_burn") {
        value = 0.014 * spent;
        item.weapon.onHitBonusDamage += value;
      } else if (effect === "on_hit_poison") {
        value = 0.012 * spent;
        item.weapon.onHitBonusDamage += value;
      } else if (effect === "on_hit_shock") {
        value = 0.018 * spent;
        item.weapon.onHitBonusDamage += value;
      } else if (effect === "on_hit_freeze") {
        value = 0.016 * spent;
        item.weapon.freezeOnHitChance += value;
      } else if (effect === "boss_damage") {
        value = 0.020 * spent;
        item.weapon.bossDamageMultiplier += value;
      } else if (effect === "execute_damage") {
        value = 0.025 * spent;
        item.weapon.executeDamageMultiplier += value;
      } else if (effect === "first_strike") {
        value = 0.030 * spent;
        item.weapon.firstStrikeDamageMultiplier += value;
      }
      if (value > 0) {
        item.mappedEffects.push({ effect, spent, value });
      }
    }

    function mappedWeaponTemplateWeight(template, focus) {
      const effects = new Set(template.effects.map(entry => entry.effect));
      let weight = 1;
      if (focus === "strength" && ["strength", "weapon_damage", "stagger"].some(effect => effects.has(effect))) {
        weight += 0.45;
      }
      if (focus === "dexterity" && ["dexterity", "hit_chance", "crit_chance", "double_strike"].some(effect => effects.has(effect))) {
        weight += 0.45;
      }
      return weight;
    }

    function makeWeaponItem(power, focus = null, isUnique = false, usedKeys = new Set()) {
      const style = chooseWeaponStyle(focus, usedKeys);
      const templates = mappedWeaponTemplatesForStyle(style);
      const template = weightedChoice((templates.length ? templates : MAPPED_WEAPON_TEMPLATES)
        .map(entry => ({ value: entry, weight: mappedWeaponTemplateWeight(entry, focus) })));
      const itemRarity = rarity(power, isUnique);
      const rawPower = Math.max(0.75, power);
      const item = makeMappedWeaponShell(template, power, itemRarity, style, isUnique);

      if (style === "sword") {
        item.weapon.damageMultiplier += 0.010 * rawPower;
        item.weapon.attackDamageMultiplier += 0.004 * rawPower;
        item.weapon.heavyDamageMultiplier += 0.004 * rawPower;
        item.weapon.quickDamageMultiplier += 0.003 * rawPower;
        item.weapon.critModifier += 0.003 * rawPower;
      } else if (style === "axe") {
        item.weapon.damageMultiplier += 0.010 * rawPower;
        item.weapon.heavyDamageMultiplier += 0.026 * rawPower;
        item.weapon.quickDamageMultiplier -= 0.010 * rawPower;
        item.weapon.sweepDamageMultiplier -= 0.006 * rawPower;
        item.weapon.hitModifier -= 0.004 * rawPower;
        item.weapon.dexterityMultiplier -= Math.min(0.16, 0.010 * rawPower);
      } else {
        item.weapon.damageMultiplier += 0.006 * rawPower;
        item.weapon.heavyDamageMultiplier -= 0.008 * rawPower;
        item.weapon.quickDamageMultiplier += 0.016 * rawPower;
        item.weapon.sweepDamageMultiplier += 0.012 * rawPower;
        item.weapon.hitModifier += 0.004 * rawPower;
        item.weapon.critModifier += 0.007 * rawPower;
        item.weapon.critMultiplierModifier += 0.008 * rawPower;
        item.weapon.dexterityMultiplier += Math.min(0.10, 0.006 * rawPower);
      }

      template.effects.forEach(entry => applyMappedWeaponEffect(item, entry.effect, rawPower * entry.weight));
      item.weapon.heavyDamageMultiplier = Math.max(0.70, item.weapon.heavyDamageMultiplier);
      item.weapon.quickDamageMultiplier = Math.max(0.70, item.weapon.quickDamageMultiplier);
      item.weapon.sweepDamageMultiplier = Math.max(0.70, item.weapon.sweepDamageMultiplier);
      item.weapon.dexterityMultiplier = Math.max(0.70, item.weapon.dexterityMultiplier);
      item.weapon.staggerOnHitChance = Math.min(0.32, item.weapon.staggerOnHitChance);
      item.weapon.freezeOnHitChance = Math.min(0.32, item.weapon.freezeOnHitChance);
      item.name = isUnique ? template.name : `${template.name} +${tier(power)}`;
      const effectDesc = item.mappedEffects
        .slice(0, 2)
        .map(entry => entry.effect.replaceAll("_", " "))
        .join(", ");
      item.desc = `${humanGain((item.weapon.damageMultiplier - 1) * 100)}% damage · ${itemRarity}${effectDesc ? ` · ${effectDesc}` : ""} · ${weaponLootNotes(item)}`;
      return item;
    }

    function makePotionItem(power, isUnique = false) {
      const itemRarity = rarity(power, isUnique);
      const bottle = healthBottle(power, isUnique);
      return {
        kind: "consumable",
        effect: "restore_hp",
        value: bottle.value,
        power,
        isUnique,
        rarity: itemRarity,
        sprite: bottle.sprite,
        name: bottle.name,
        tier: bottle.tier,
        desc: `Restore ${humanHp(bottle.value)} HP now · ${itemRarity} · fixed bottle, no max HP`
      };
    }

    function chooseLoot(index) {
      if (state.phase !== "loot") return;
      const item = state.draft[index];
      if (!item) return;
      const chosenScore = lootChoiceScore(item);
      if (item.kind === "consumable") {
        const before = state.player.hp;
        state.player.hp = Math.min(state.player.maxHp, state.player.hp + item.value);
        state.player.consumed += 1;
        state.debug.lootConsumed += 1;
        state.debug.lootHistory.push({
          room: state.roomIndex + 1,
          action: "consume",
          name: item.name,
          score: chosenScore
        });
        log(`Drank ${item.name}. Restored ${humanHp(state.player.hp - before)} HP.`, "good");
      } else {
        equipWearableItem(item);
        state.debug.lootEquipped += 1;
        state.debug.lootHistory.push({
          room: state.roomIndex + 1,
          action: "equip",
          slot: slotForItem(item),
          name: item.name,
          score: chosenScore
        });
        log(`Equipped ${item.name}.`, "good");
      }
      state.roomIndex += 1;
      state.draft = [];
      startRoom();
    }

    function skipLoot() {
      if (state.phase !== "loot") return;
      state.debug.lootSkipped += 1;
      state.debug.lootHistory.push({
        room: state.roomIndex + 1,
        action: "skip",
        bestOfferScore: state.draft.length ? Math.max(...state.draft.map(lootChoiceScore)) : 0
      });
      log("Kept current gear.");
      state.roomIndex += 1;
      state.draft = [];
      startRoom();
    }

    function runExportPayload() {
      const character = activeCharacter();
      return {
        exportedAt: new Date().toISOString(),
        character: {
          id: selectedCharacterId,
          name: character.name,
          weapon: state.player.weapon.name,
          weights: character.weights
        },
        progress: {
          roomIndex: state.roomIndex + 1,
          phase: state.phase,
          round: state.round,
          roomsCleared: state.debug.roomsCleared,
          trainingBudget: Number((state.trainingBudget || 0).toFixed(3))
        },
        player: {
          hp: Number(state.player.hp.toFixed(3)),
          maxHp: Number(state.player.maxHp.toFixed(3)),
          mana: Number((state.player.mana || 0).toFixed(3)),
          maxMana: Number((state.player.maxMana || 0).toFixed(3)),
          strength: Number(state.player.strength.toFixed(3)),
          dexterity: Number(state.player.dexterity.toFixed(3)),
          weapon: state.player.weapon,
          gear: state.player.items.map(item => ({
            name: item.name,
            kind: item.kind,
            slot: slotForItem(item),
            stat: item.stat || null,
            value: item.value || null,
            rarity: item.rarity || null
          })),
          stash: state.player.stash.map(item => item.name)
        },
        debug: {
          actions: state.debug.actions,
          damageDealt: Number(state.debug.damageDealt.toFixed(3)),
          damageTaken: Number(state.debug.damageTaken.toFixed(3)),
          lootEquipped: state.debug.lootEquipped,
          lootConsumed: state.debug.lootConsumed,
          lootSkipped: state.debug.lootSkipped,
          lootHistory: state.debug.lootHistory.slice(-20)
        },
        enemies: state.enemies.map(enemy => ({
          name: enemy.name,
          hp: Number(enemy.hp.toFixed(3)),
          maxHp: enemy.maxHp,
          intent: enemy.intent,
          tags: enemy.tags
        })),
        recentLog: state.log.slice(-20).map(entry => entry.text)
      };
    }

    function runExportMarkdown(payload) {
      const actions = Object.entries(payload.debug.actions)
        .map(([action, count]) => `${action}:${count}`)
        .join(" ");
      const loot = payload.debug.lootHistory.length
        ? payload.debug.lootHistory.map(item => `- R${item.room} ${item.action}: ${item.name || "kept gear"} (${fmt(item.score ?? item.bestOfferScore ?? 0, 2)})`).join("\n")
        : "- none";
      const logLines = payload.recentLog.map(entry => `- ${entry}`).join("\n");
      return `# Dungeon Run Export

${payload.exportedAt}

Character: ${payload.character.name}
Weapon: ${payload.character.weapon}
Room: ${payload.progress.roomIndex}
Phase: ${payload.progress.phase}
Round: ${payload.progress.round}

HP: ${humanHp(payload.player.hp)} / ${humanHp(payload.player.maxHp)}
Mana: ${humanMana(payload.player.mana)} / ${humanMana(payload.player.maxMana)}
STR: ${humanStat(payload.player.strength)}
DEX: ${humanStat(payload.player.dexterity)}
Training: ${fmt(payload.progress.trainingBudget, 2)}

Actions: ${actions}
Damage dealt: ${humanDamage(payload.debug.damageDealt)}
Damage taken: ${humanDamage(payload.debug.damageTaken)}
Loot equipped: ${payload.debug.lootEquipped}
Loot consumed: ${payload.debug.lootConsumed}
Loot skipped: ${payload.debug.lootSkipped}

## Loot
${loot}

## State JSON
\`\`\`json
${JSON.stringify(payload, null, 2)}
\`\`\`

## Recent Log
${logLines || "- none"}
`;
    }

    function downloadText(filename, text) {
      const blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    async function exportRun() {
      const payload = runExportPayload();
      const markdown = runExportMarkdown(payload);
      try {
        await navigator.clipboard.writeText(markdown);
        log("Run export copied to clipboard.", "good");
      } catch (error) {
        downloadText(`dungeon-run-${payload.exportedAt.replace(/[:.]/g, "-")}.md`, markdown);
        log("Run export downloaded.", "good");
      }
      render();
    }

    function autoTargetIndex() {
      const alive = state.enemies
        .map((enemy, index) => ({ enemy, index }))
        .filter(({ enemy }) => enemy.hp > 0);
      if (!alive.length) return -1;

      const priority = ({ enemy }) => {
        const supportBonus = enemy.tags.includes("mage-support") ? 3.6 : 0;
        const spellBonus = ["heal", "shield", "invisibility"].includes(enemy.intent) ? 1.2 : 0;
        const intentMultiplier = enemy.intent === "heavy" ? 2 : 1;
        const effectiveHp = enemy.hp + (enemy.shield || 0);
        return [
          (enemyIntentDamage(enemy) * intentMultiplier + supportBonus + spellBonus) / Math.max(effectiveHp, 0.1),
          -effectiveHp
        ];
      };

      return alive.reduce((best, current) => {
        const bestPriority = priority(best);
        const currentPriority = priority(current);
        return currentPriority[0] > bestPriority[0]
          || (currentPriority[0] === bestPriority[0] && currentPriority[1] > bestPriority[1])
          ? current
          : best;
      }).index;
    }

    function bestFocusedAction(enemy) {
      return ["attack", "heavy", "quick"]
        .filter(canAffordAction)
        .map(action => ({ action, value: expectedPlayerDamage(enemy, action) }))
        .sort((a, b) => b.value - a.value)[0];
    }

    function shouldQuickBoss(target) {
      if (!canAffordAction("quick") || !target || !target.tags.includes("boss") || target.intent === "guard") return false;
      if (target.intent === "heavy") return true;
      const quickDamage = expectedPlayerDamage(target, "quick");
      const bestDamage = Math.max(
        expectedPlayerDamage(target, "attack"),
        expectedPlayerDamage(target, "heavy"),
        quickDamage
      );
      const quickHit = playerHitChance(target, "quick");
      const heavyHit = playerHitChance(target, "heavy");
      return quickDamage >= bestDamage * 0.72 && quickHit >= heavyHit + 0.12;
    }

    function shouldHeavySingleTarget(target, incoming) {
      if (!canAffordAction("heavy") || !target || target.intent === "guard") return false;
      const heavyPayoff = (state.player.weapon.sunderOnHit || 0) > 0
        || (state.player.weapon.sunderOnHeavyHit || 0) > 0
        || (state.player.weapon.stunOnHeavyHitChance || 0) > 0
        || (state.player.weapon.heavyDamageMultiplier || 1) >= 1.12;
      const incomingSafe = incoming < Math.max(state.player.hp * 0.28, state.player.maxHp * 0.18);
      return heavyPayoff
        && incomingSafe
        && expectedPlayerDamage(target, "heavy") >= expectedPlayerDamage(target, "attack") * 1.20
        && playerHitChance(target, "heavy") >= playerHitChance(target, "attack") - 0.22;
    }

    function shouldHeavyDefault(target, incoming) {
      if (!canAffordAction("heavy") || !target || target.intent === "guard") return false;
      const incomingSafe = incoming < Math.max(state.player.hp * 0.28, state.player.maxHp * 0.18);
      return incomingSafe
        && expectedPlayerDamage(target, "heavy") >= expectedPlayerDamage(target, "attack") * 1.30
        && playerHitChance(target, "heavy") >= playerHitChance(target, "attack") - 0.20;
    }

    function shouldQuickSingleTarget(target) {
      if (!canAffordAction("quick") || !target || target.intent === "guard") return false;
      return expectedPlayerDamage(target, "quick") >= expectedPlayerDamage(target, "attack") * 0.82
        && playerHitChance(target, "quick") >= playerHitChance(target, "attack") + 0.08;
    }

    function autoCombatChoice() {
      const alive = state.enemies.filter(enemy => enemy.hp > 0);
      if (!alive.length) return null;

      const targetIndex = autoTargetIndex();
      const target = state.enemies[targetIndex];
      const finisher = bestFocusedAction(target);
      if (finisher && finisher.value >= (target.hp + (target.shield || 0)) * 0.90) {
        return { action: finisher.action, targetIndex };
      }

      const incoming = alive.reduce((sum, enemy) => sum + enemyIntentDamage(enemy), 0);
      if (riposteAutoAvailable(alive) && incoming >= Math.max(state.player.hp * 0.42, state.player.maxHp * 0.28)) {
        return { action: "ability", targetIndex: -1 };
      }

      const heavyTargets = state.enemies
        .map((enemy, index) => ({ enemy, index }))
        .filter(({ enemy }) => enemy.hp > 0 && enemy.intent === "heavy");
      if (canAffordAction("quick") && heavyTargets.length && (
        state.player.dexterity >= 7
        || heavyTargets.some(({ enemy }) => enemy.tags.includes("boss"))
      )) {
        const heavyTarget = heavyTargets.reduce((best, current) =>
          enemyIntentDamage(current.enemy) > enemyIntentDamage(best.enemy) ? current : best
        );
        return { action: "quick", targetIndex: heavyTarget.index };
      }

      if (incoming >= Math.max(state.player.hp * 0.42, state.player.maxHp * 0.28)) {
        return { action: "guard", targetIndex: -1 };
      }

      if (alive.length > 1) {
        const bestSingleTarget = Math.max(...alive.flatMap(enemy => [
          expectedPlayerDamage(enemy, "attack"),
          expectedPlayerDamage(enemy, "heavy"),
          expectedPlayerDamage(enemy, "quick")
        ]));
        if (canAffordAction("sweep") && expectedSweepDamage() >= bestSingleTarget * TACTICAL.sweepAutoDamageRatio) {
          return { action: "sweep", targetIndex: -1 };
        }
      }

      if (target.intent === "guard" && canAffordAction("heavy")) return { action: "heavy", targetIndex };
      if (shouldQuickBoss(target)) return { action: "quick", targetIndex };
      if (canAffordAction("quick") && state.player.dexterity > state.player.strength && state.player.dexterity >= 7.5) {
        return { action: "quick", targetIndex };
      }
      if (shouldHeavySingleTarget(target, incoming)) {
        return { action: "heavy", targetIndex };
      }
      if (shouldHeavyDefault(target, incoming)) return { action: "heavy", targetIndex };
      if (shouldQuickSingleTarget(target)) return { action: "quick", targetIndex };
      if (
        canAffordAction("heavy")
        && state.player.strength >= 7
        && incoming < Math.max(state.player.hp * 0.28, state.player.maxHp * 0.18)
        && expectedPlayerDamage(target, "heavy") >= expectedPlayerDamage(target, "attack") * 1.24
        && playerHitChance(target, "heavy") >= playerHitChance(target, "attack") - 0.08
      ) {
        return { action: "heavy", targetIndex };
      }
      return { action: "attack", targetIndex };
    }

    function autoAction() {
      if (state.phase === "loot") {
        const scored = state.draft
          .map((item, index) => ({ index, score: lootChoiceScore(item) }))
          .sort((a, b) => b.score - a.score);
        if (!scored.length || scored[0].score <= LOOT.minimumUpgradeScore) {
          skipLoot();
        } else {
          chooseLoot(scored[0].index);
        }
        return;
      }
      if (state.phase !== "combat") return;
      const choice = autoCombatChoice();
      if (choice) {
        if (choice.targetIndex >= 0) state.selected = choice.targetIndex;
        useAction(choice.action);
      }
    }

    function spriteStyle(sprite) {
      const x = sprite.col * 16 * SHEET_SCALE;
      const y = sprite.row * 16 * SHEET_SCALE;
      return [
        `background-image:url('${ITEM_SHEET_URL}')`,
        `background-position: -${x}px -${y}px`
      ].join(";");
    }

    function creatureSpriteStyle(frame, scale = 2) {
      const sheet = CREATURE_CATALOG.sheets?.creatures;
      if (!sheet || !frame) return "";
      const imageUrl = (CREATURE_SHEET_URL || `file://${sheet.source_image}`).replaceAll("'", "%27");
      return [
        `background-image:url('${imageUrl}')`,
        `background-size:${sheet.width * scale}px ${sheet.height * scale}px`,
        `background-position:-${Number(frame.x || 0) * scale}px -${Number(frame.y || 0) * scale}px`,
        `width:${Number(frame.w || 24) * scale}px`,
        `height:${Number(frame.h || 24) * scale}px`
      ].join(";");
    }

    function enemyAvatar(enemy) {
      const initial = enemy.name.split(" ").slice(-1)[0].slice(0, 1);
      if (!enemy.visualFrame) return `<div class="avatar">${initial}</div>`;
      return `<div class="avatar"><span class="enemy-sprite" style="${creatureSpriteStyle(enemy.visualFrame)}"></span></div>`;
    }

    function renderRooms() {
      $("rooms").innerHTML = dungeon.map((room, index) => {
        const classes = ["room"];
        if (room.isBoss) classes.push("boss");
        if (index === state.roomIndex) classes.push("current");
        if (index < state.roomIndex) classes.push("cleared");
        const floorRoom = index % (DUNGEON.encountersPerLevel + 1);
        const label = room.isBoss ? `L${room.level}B` : `P${room.powerLevel || "?"}`;
        return `<div class="${classes.join(" ")}" title="Room ${index + 1} · ${roomKindLabel(room)}">${label}</div>`;
      }).join("");
    }

    function renderEnemies() {
      $("enemyList").innerHTML = state.enemies.map((enemy, index) => {
        const hpPct = enemy.maxHp > 0 ? clamp(enemy.hp / enemy.maxHp, 0, 1) : 0;
        const classes = ["enemy"];
        if (index === state.selected) classes.push("selected");
        if (enemy.hp <= 0) classes.push("dead");
        if (enemy.riposted) classes.push("riposted");
        const shieldText = enemy.shield > 0 ? ` · Shield ${humanHp(enemy.shield)}` : "";
        const invisibleText = enemy.invisible ? " · hidden" : "";
        const riposteText = enemy.riposted ? " · riposted" : "";
        const hpText = `${humanHp(enemy.hp)} / ${humanHp(enemy.maxHp)} HP${enemy.shield > 0 ? ` · +${humanHp(enemy.shield)} shield` : ""}`;
        return `<article class="${classes.join(" ")}" data-enemy="${index}">
          ${enemyAvatar(enemy)}
          <div>
            <div class="enemy-name">${enemy.name}</div>
            <div class="intent ${enemy.intent}">${enemy.intent}${enemy.aimed ? " +" : ""}${enemy.sunder ? ` · Sunder ${enemy.sunder}` : ""}${shieldText}${invisibleText}${riposteText}</div>
            <div class="bar"><span style="width:${hpPct * 100}%"></span></div>
            <div class="muted" style="font-size:12px;margin-top:4px">${hpText}</div>
          </div>
        </article>`;
      }).join("");
      document.querySelectorAll("[data-enemy]").forEach(node => {
        node.addEventListener("click", () => {
          const index = Number(node.dataset.enemy);
          if (state.enemies[index].hp > 0) {
            state.selected = index;
            render();
          }
        });
      });
    }

    function renderLoot() {
      if (state.phase !== "loot") {
        $("lootGrid").innerHTML = "";
        return;
      }
      const cards = state.draft.map((item, index) => {
        const delta = lootChoiceScore(item);
        const deltaClass = delta > LOOT.minimumUpgradeScore
          ? "good"
          : delta < -LOOT.minimumUpgradeScore
            ? "bad"
            : "warn";
        const deltaText = item.kind === "consumable"
          ? (delta > 0 ? "useful heal now" : "no missing HP")
          : delta > LOOT.minimumUpgradeScore
            ? `${SLOT_LABELS[slotForItem(item)] || "Gear"} upgrade`
            : delta < -LOOT.minimumUpgradeScore
              ? `${SLOT_LABELS[slotForItem(item)] || "Gear"} downgrade`
              : "sidegrade";
        return `
        <button class="loot-card ${item.kind} ${rarityClass(item)}" data-loot="${index}">
          <span class="sprite" style="${spriteStyle(item.sprite)}"></span>
          <span>
            <span class="loot-name">${item.name}</span>
            <span class="loot-desc">${item.desc}</span>
            <span class="loot-delta ${deltaClass}">${deltaText}</span>
          </span>
        </button>
      `;
      });
      cards.push(`
        <button class="loot-card skip" data-skip-loot="true">
          <span>
            <span class="loot-name">Keep current gear</span>
            <span class="loot-desc">Continue without swapping equipment.</span>
          </span>
        </button>
      `);
      $("lootGrid").innerHTML = cards.join("");
      document.querySelectorAll("[data-loot]").forEach(node => {
        node.addEventListener("click", () => chooseLoot(Number(node.dataset.loot)));
      });
      const skip = document.querySelector("[data-skip-loot]");
      if (skip) skip.addEventListener("click", skipLoot);
    }

    function renderLog() {
      const logNode = $("log");
      logNode.innerHTML = state.log
        .map(entry => `<div class="log-entry ${entry.cls}">${entry.text}</div>`)
        .join("");
      logNode.scrollTop = logNode.scrollHeight;
    }

    function renderActionButtons() {
      const target = state.enemies[state.selected] && state.enemies[state.selected].hp > 0
        ? state.enemies[state.selected]
        : state.enemies.find(enemy => enemy.hp > 0);
      const labels = {
        attack: "Attack",
        heavy: (state.player.weapon.sunderOnHit || state.player.weapon.stunOnHeavyHitChance) ? "Slam" : "Heavy",
        quick: "Quick",
        sweep: "Sweep",
        guard: "Guard",
        ability: activeAbility()?.name || "Ability"
      };
      const live = state.phase === "combat" && state.player.hp > 0;
      const incoming = expectedIncomingDamage(false);
      const guarded = expectedIncomingDamage(true);
      const riposted = expectedIncomingDamage("ability");
      const riposteReady = riposteAutoAvailable();

      document.querySelectorAll("[data-action]").forEach(button => {
        const action = button.dataset.action;
        const manaCost = actionManaCost(action);
        const manaText = manaCost > 0 ? `${manaCost} MP` : "free";
        const affordable = canAffordAction(action);
        let meta = manaText;
        let extra = "";
        let extraClass = "";

        if (live && action === "ability") {
          const ability = activeAbility();
          if (ability) {
            meta = `${manaText} · charges ${state.player.abilityCharges || 0}/${ability.charges}`;
            extra = !affordable
              ? `need ${manaCost} MP`
              : incoming > 0
                ? `${abilityComment(ability)} · ${humanDamage(incoming)} -> ${humanDamage(riposted)}`
                : abilityComment(ability);
            if (abilityAvailable() && !riposteReady && (ability.manaCost || 0) > 0) {
              extra = `${extra} · save for elite/tank/boss`;
            }
            extraClass = riposteReady ? "good" : affordable ? "warn" : "bad";
          } else {
            meta = "not learned";
            extra = "no class ability";
            extraClass = "warn";
          }
        } else if (live && action === "guard") {
          meta = incoming > 0 ? `${manaText} · incoming ${humanDamage(incoming)} -> ${humanDamage(guarded)}` : `${manaText} · no incoming`;
          extra = "best into heavy / group damage";
          extraClass = incoming > 0 ? "good" : "";
        } else if (live && action === "sweep") {
          const liveEnemies = state.enemies.filter(enemy => enemy.hp > 0);
          const aliveCount = liveEnemies.length;
          const sweepTotal = expectedSweepDamage();
          const sweepEach = aliveCount ? sweepTotal / aliveCount : 0;
          meta = `${manaText} · no crit · ${humanDamage(sweepEach)} each`;
          extra = !affordable
            ? `need ${manaCost} MP`
            : aliveCount > 1
              ? `~${humanDamage(sweepTotal)} total · DEX x${fmt(actionDamageMultiplier("sweep"), 2)}`
              : "weak single-target";
          extraClass = !affordable ? "bad" : aliveCount > 1 ? "good" : "warn";
        } else if (live && target) {
          let damage = expectedPlayerDamage(target, action);
          if (action === "quick") {
            damage += doubleStrikeChance() * expectedPlayerDamage(
              target,
              action,
              TACTICAL.doubleStrikeDamageMultiplier,
              false
            );
          }
          meta = `${manaText} · ${humanDamageRange(damage)} dmg`;
          if (!affordable) {
            extra = `need ${manaCost} MP`;
            extraClass = "bad";
          } else if (action === "heavy") {
            const penalty = heavyEvasionHitPenalty(target);
            const sunderAdded = sunderAddedByAction(action);
            if (sunderAdded > 0) {
              extra = `slam: +${sunderAdded} Sunder${target.sunder ? " · amplified" : ""}`;
              extraClass = "good";
            } else if (state.player.weapon.stunOnHeavyHitChance) {
              extra = "slam: can stun";
              extraClass = "good";
            } else {
              extra = target.intent === "guard"
                ? "punches through guard"
                : penalty > 0
                  ? "weaker into evasive targets"
                  : "burst, risky";
              extraClass = target.intent === "guard" ? "good" : penalty > 0 ? "bad" : "warn";
            }
          } else if (action === "quick") {
            extra = quickPressureNote(target);
            extraClass = "pressure";
          } else {
            const sunderAdded = sunderAddedByAction(action);
            extra = sunderAdded > 0
              ? `crush: +${sunderAdded} Sunder${target.sunder ? " · amplified" : ""}`
              : "stable baseline";
            extraClass = sunderAdded > 0 ? "good" : "";
          }
        }

        button.innerHTML = `
          <span class="action-title">${labels[action]}</span>
          <span class="action-meta">${meta}</span>
          <span class="action-extra ${extraClass}">${extra}</span>
        `;
        const actionReady = action === "ability" ? abilityAvailable() : affordable;
        button.classList.toggle("pressure-ready", live && action === "quick" && affordable);
        button.classList.toggle("riposte-ready", live && action === "ability" && riposteReady);
        button.disabled = !live || !actionReady;
      });
    }

    function render() {
      renderRooms();
      const room = dungeon[state.roomIndex];
      $("encounterTitle").textContent = room ? `R${state.roomIndex + 1} · L${room.level} ${roomKindLabel(room)}` : "Cleared";
      $("phaseValue").textContent = state.phase;
      $("roundValue").textContent = String(state.round);
      $("hpValue").textContent = humanHp(state.player.hp);
      $("maxHpValue").textContent = humanHp(state.player.maxHp);
      $("manaValue").textContent = humanMana(state.player.mana);
      $("maxManaValue").textContent = humanMana(state.player.maxMana);
      $("strValue").textContent = humanStat(state.player.strength);
      $("dexValue").textContent = humanStat(state.player.dexterity);
      $("weaponValue").textContent = state.player.weapon.name;
      $("characterSelect").value = selectedCharacterId;
      $("buildTag").textContent = `character: ${activeCharacter().name}`;
      $("lootCount").textContent = `${state.player.items.length}/${LOOT.wearableSlotLimit} · ${state.player.stash.length}/${LOOT.stashSlotLimit}`;
      $("hpBar").style.width = `${clamp(state.player.hp / state.player.maxHp, 0, 1) * 100}%`;
      $("manaBar").style.width = `${clamp(state.player.mana / state.player.maxMana, 0, 1) * 100}%`;
      const target = state.enemies[state.selected];
      $("targetValue").textContent = target && target.hp > 0 ? target.name.split(" ").slice(-2).join(" ") : "-";
      renderEnemies();
      renderLoot();
      renderLog();
      renderActionButtons();
    }

    function reset() {
      dungeon = buildDungeon();
      state.roomIndex = 0;
      state.phase = "combat";
      state.round = 1;
      state.selected = 0;
      state.trainingBudget = DUNGEON.initialStatBudget;
      state.player = {
        maxHp: STATS.baseHp,
        hp: STATS.baseHp,
        maxMana: maxManaForPlayer(),
        mana: startingManaForPlayer(),
        strength: STATS.baseStrength,
        dexterity: STATS.baseDexterity,
        startingWeapon: makeStarterWeapon(),
        weapon: makeStarterWeapon(),
        abilityCharges: activeAbility()?.charges || 0,
        items: [],
        stash: [],
        consumed: 0
      };
      state.levelPool = null;
      state.enemies = [];
      state.draft = [];
      state.log = [];
      state.debug = createDebugState();
      startRoom();
    }

    document.querySelectorAll("[data-action]").forEach(button => {
      button.addEventListener("click", () => useAction(button.dataset.action));
    });
    $("resetBtn").addEventListener("click", reset);
    $("autoBtn").addEventListener("click", autoAction);
    $("exportBtn").addEventListener("click", exportRun);
    $("characterSelect").addEventListener("input", () => {
      const nextCharacter = CHARACTER_ROSTER[$("characterSelect").value];
      if (!nextCharacter || !nextCharacter.unlocked) {
        $("characterSelect").value = selectedCharacterId;
        return;
      }
      selectedCharacterId = $("characterSelect").value;
      reset();
    });

    reset();
  </script>
</body>
</html>
